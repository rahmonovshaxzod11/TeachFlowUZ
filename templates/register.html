{% extends "base.html" %}

{% block title %}Ro'yxatdan O'tish — TeachFlowUZ{% endblock %}

{% block content %}
<div style="max-width:400px; margin: 40px auto; background: var(--bg-card); padding: 30px; border-radius: var(--border-radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);">
    <div style="text-align: center; margin-bottom: 24px;">
        <div style="font-size: 3rem; margin-bottom: 10px;">✨</div>
        <h2 class="section-title" style="margin-bottom: 5px;">Ro'yxatdan O'tish</h2>
        <p class="section-subtitle" style="font-size: 0.9rem;">Platformamizga yangi foydalanuvchi sifatida qo'shiling</p>
    </div>

    <form method="POST" action="/register">
        <div class="form-group">
            <label class="form-label" style="font-weight:600;">Login (Foydalanuvchi nomi yangi o'ylab toping)</label>
            <input type="text" name="username" class="form-input" required placeholder="Masalan: Sardor99" style="padding: 12px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-top:20px;">
            <label class="form-label" style="font-weight:600;">Parol o'ylab toping</label>
            <input type="password" name="password" class="form-input" required placeholder="Kamida 6 ta belgi" style="padding: 12px; font-size: 1rem;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px; padding: 12px; font-size: 1.05rem; justify-content: center;">
            Ro'yxatdan O'tish 📝
        </button>
    </form>

    <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <p style="color: var(--text-secondary); font-size: 0.9rem;">
            Allaqachon hisobingiz bormi? 
            <a href="/login" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Tizimga kirish</a>
        </p>
    </div>
</div>
{% endblock %}
