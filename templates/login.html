{% extends "base.html" %}

{% block title %}Tizimga Kirish — TeachFlowUZ{% endblock %}

{% block content %}
<div style="max-width:400px; margin: 40px auto; background: var(--bg-card); padding: 30px; border-radius: var(--border-radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-sm);">
    <div style="text-align: center; margin-bottom: 24px;">
        <div style="font-size: 3rem; margin-bottom: 10px;">🔐</div>
        <h2 class="section-title" style="margin-bottom: 5px;">Tizimga Kirish</h2>
        <p class="section-subtitle" style="font-size: 0.9rem;">TeachFlowUZ platformasiga xush kelibsiz</p>
    </div>

    <form method="POST" action="/login">
        <div class="form-group">
            <label class="form-label" style="font-weight:600;">Login (Foydalanuvchi nomi)</label>
            <input type="text" name="username" class="form-input" required placeholder="Foydalanuvchi nomingizni kiriting" style="padding: 12px; font-size: 1rem;">
        </div>

        <div class="form-group" style="margin-top:20px;">
            <label class="form-label" style="font-weight:600;">Parol</label>
            <input type="password" name="password" class="form-input" required placeholder="Parolni kiriting" style="padding: 12px; font-size: 1rem;">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 25px; padding: 12px; font-size: 1.05rem; justify-content: center;">
            Kirish 🚀
        </button>
    </form>

    <div style="text-align: center; margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 20px;">
        <p style="color: var(--text-secondary); font-size: 0.9rem;">
            Hisobingiz yo'qmi? 
            <a href="/register" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Ro'yxatdan o'tish</a>
        </p>
    </div>
</div>
{% endblock %}
